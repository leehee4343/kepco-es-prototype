<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PMS 메뉴구조도 및 기능명세</title>
<style>
:root{
  --blue:#2563eb; --blue-lt:#e8f0fe; --blue-md:#93c5fd; --blue-dk:#1d4ed8;
  --navy:#1e3a5f; --navy-lt:#e6ecf3; --navy-md:#7d97b8; --navy-dk:#12263f;
  --green:#16a34a; --green-lt:#e3f9ed; --green-md:#7fe0ac; --green-dk:#0d7a3a;
  --amber:#f5870a; --amber-lt:#fff1e0; --amber-md:#ffb35c; --amber-dk:#c2660a;
  --red:#ef4444; --red-lt:#fdecec; --red-md:#fca5a5; --red-dk:#c0291a;
  --purple:#7c3aed; --purple-lt:#f1e9fe; --purple-md:#c4a4f7; --purple-dk:#5b21b6;
  --bg:#f5f7fa; --bg2:#fff; --text:#1a202c; --text2:#5b6472; --line:#e3e7ee;
}
*{box-sizing:border-box;}
body{margin:0;font-family:'Noto Sans KR',-apple-system,BlinkMacSystemFont,'Malgun Gothic',sans-serif;background:var(--bg);color:var(--text);font-size:16px;}
::-webkit-scrollbar{width:8px;height:8px;}
::-webkit-scrollbar-thumb{background:#c7cedb;border-radius:4px;}

.hdr{background:var(--navy-dk);padding:14px 24px;position:sticky;top:0;z-index:60;box-shadow:0 2px 8px rgba(0,0,0,.15);}
.hdr-top{display:flex;align-items:center;justify-content:space-between;gap:14px;flex-wrap:wrap;}
.hdr-l{display:flex;align-items:center;gap:12px;}
.hdr-logo{width:38px;height:38px;border-radius:8px;background:linear-gradient(135deg,var(--blue),var(--navy));display:flex;align-items:center;justify-content:center;color:#fff;font-weight:700;font-size:14px;flex:0 0 38px;}
.hdr-title{color:#fff;font-size:17px;font-weight:700;}
.hdr-sub{color:#9db2c9;font-size:13px;margin-top:1px;}
.hdr-r{display:flex;align-items:center;gap:10px;flex-wrap:wrap;}
.hdr-search{background:rgba(255,255,255,.1);border:1px solid rgba(255,255,255,.18);border-radius:8px;padding:8px 12px;color:#fff;font-size:14px;width:220px;outline:none;}
.hdr-search::placeholder{color:#a9bbcf;}
.hdr-btn{background:rgba(255,255,255,.12);border:1px solid rgba(255,255,255,.2);color:#fff;padding:9px 14px;border-radius:8px;font-size:14px;cursor:pointer;white-space:nowrap;}
.hdr-btn:hover{background:rgba(255,255,255,.22);}
.hdr-btn.on{background:var(--blue);border-color:var(--blue);}
.hdr-dl{background:var(--green);border:none;color:#fff;padding:9px 14px;border-radius:8px;font-size:14px;cursor:pointer;text-decoration:none;display:inline-flex;align-items:center;gap:6px;white-space:nowrap;}
.hdr-dl:hover{background:var(--green-dk);}
.hdr-switch{background:rgba(255,255,255,.12);border:1px solid rgba(255,255,255,.2);color:#fff;padding:9px 14px;border-radius:8px;font-size:14px;text-decoration:none;display:inline-flex;align-items:center;gap:6px;white-space:nowrap;}
.hdr-switch:hover{background:rgba(255,255,255,.22);}

.statbar{display:flex;gap:12px;padding:14px 24px 0;flex-wrap:wrap;max-width:1180px;margin:0 auto;}
.stat{background:var(--bg2);border:1px solid var(--line);border-radius:10px;padding:10px 16px;flex:1;min-width:120px;display:flex;align-items:baseline;gap:8px;}
.stat .v{font-size:19px;font-weight:800;color:var(--blue-dk);}
.stat .l{font-size:12.5px;color:var(--text2);}

.tabbar{display:flex;gap:8px;padding:14px 24px;max-width:1180px;margin:0 auto;flex-wrap:wrap;}
.tab{background:var(--bg2);border:1px solid var(--line);border-radius:20px;padding:8px 16px;font-size:13.5px;font-weight:600;cursor:pointer;color:var(--text2);display:flex;align-items:center;gap:6px;white-space:nowrap;}
.tab:hover{border-color:var(--tc-md);}
.tab.on{background:var(--tc);color:#fff;border-color:var(--tc);}
.tab .cnt{font-size:11px;background:rgba(0,0,0,.1);border-radius:10px;padding:1px 7px;}
.tab.on .cnt{background:rgba(255,255,255,.25);}

.wrap{max-width:1180px;margin:0 auto;padding:6px 24px 60px;}

.view{display:none;}
.view.on{display:block;}

.role-sec{margin-bottom:30px;}
.role-sec-hdr{display:flex;align-items:center;gap:10px;padding:10px 0 12px;border-bottom:2px solid var(--rc);margin-bottom:14px;}
.role-sec-ic{width:32px;height:32px;border-radius:8px;background:var(--rc-lt);color:var(--rc-dk);display:flex;align-items:center;justify-content:center;font-size:16px;flex:0 0 32px;}
.role-sec-t{font-size:17px;font-weight:800;color:var(--rc-dk);}
.role-sec-cnt{margin-left:auto;font-size:12.5px;color:var(--text2);}

details.acc{background:var(--bg2);border:1px solid var(--line);border-radius:10px;margin-bottom:8px;overflow:hidden;}
details.acc[open]{border-color:var(--ac-md);}
details.acc.lvl1{border-left:4px solid var(--ac);}
details.acc.lvl2{margin-left:20px;border-left:3px solid var(--line);}
details.acc.lvl2[open]{border-left-color:var(--ac-md);}
details.acc.lvl3{margin-left:20px;border-left:3px solid var(--line);}
summary{padding:12px 16px;cursor:pointer;font-weight:700;font-size:15px;list-style:none;display:flex;align-items:center;gap:8px;}
summary::-webkit-details-marker{display:none;}
summary::before{content:'▶';font-size:10px;color:var(--text2);transition:transform .15s;flex:0 0 10px;}
details[open]>summary::before{transform:rotate(90deg);}
summary .lvl-tag{font-size:11px;font-weight:700;background:var(--bg);color:var(--text2);border-radius:10px;padding:2px 8px;margin-left:auto;}
summary .dup-tag{font-size:10.5px;font-weight:700;background:var(--red-lt);color:var(--red-dk);border-radius:10px;padding:2px 8px;}
.acc-body{padding:0 16px 16px;}

.leaf-card{padding:14px 16px 16px;border-top:1px dashed var(--line);}
.leaf-card:first-child{border-top:none;}
.leaf-badges{display:flex;gap:8px;margin-bottom:12px;flex-wrap:wrap;}
.bdg{font-size:12px;font-weight:700;padding:4px 10px;border-radius:20px;}
.b-sys{background:var(--purple-lt);color:var(--purple-dk);}
.b-depth{background:var(--bg);color:var(--text2);border:1px solid var(--line);}
.b-id{background:var(--navy-lt);color:var(--navy-dk);font-family:'SFMono-Regular',Consolas,monospace;font-size:11.5px;}
.b-url{background:var(--bg);color:var(--text2);border:1px solid var(--line);font-family:'SFMono-Regular',Consolas,monospace;font-size:11.5px;}
.b-status{color:#fff;}
.b-date{background:var(--green-lt);color:var(--green-dk);}
.b-req{background:var(--navy-lt);color:var(--navy-dk);}

.panel-t{font-size:12.5px;font-weight:700;color:var(--text2);text-transform:uppercase;letter-spacing:.03em;margin-bottom:8px;display:flex;align-items:center;gap:6px;}
.panel-t .dot{width:6px;height:6px;border-radius:50%;background:var(--blue);}
.func-list{margin:0 0 4px;padding:0;list-style:none;}
.func-list li{font-size:14.5px;line-height:1.6;padding-left:18px;position:relative;margin-bottom:5px;}
.func-list li.top::before{content:'●';position:absolute;left:0;top:9px;font-size:5px;color:var(--blue);}
.func-list li.sub{margin-left:16px;color:var(--text2);font-size:14px;}
.func-list li.sub::before{content:'–';position:absolute;left:0;color:var(--text2);}
.func-list li.hd{padding-left:0;font-weight:700;color:var(--navy-dk);margin-top:8px;margin-bottom:6px;font-size:14.5px;}
.func-list li.hd:first-child{margin-top:0;}
.func-list li.blank{height:5px;}

.req-panel{background:var(--navy-lt);border:1px solid var(--navy-md);border-radius:10px;padding:12px 14px;margin-top:12px;}
.req-panel .panel-t{color:var(--navy-dk);margin-bottom:6px;}
.req-panel .panel-t .dot{background:var(--navy);}

.tcnt{font-size:13px;color:var(--text2);margin:10px 2px 12px;}
.tbl-wrap{background:var(--bg2);border:1px solid var(--line);border-radius:12px;overflow:auto;}
table.mt{width:100%;border-collapse:collapse;font-size:13.5px;}
table.mt th{background:var(--navy-lt);color:var(--navy-dk);text-align:left;padding:10px 12px;font-size:12.5px;font-weight:700;position:sticky;top:0;white-space:nowrap;}
table.mt td{padding:10px 12px;border-top:1px solid var(--line);vertical-align:top;}
table.mt td.wrap{white-space:pre-line;line-height:1.55;font-size:13px;}
table.mt td.mono{font-family:'SFMono-Regular',Consolas,monospace;font-size:12px;color:var(--text2);white-space:nowrap;}
table.mt tr:hover td{background:#fafbfd;}
.tr-tag{font-weight:700;font-size:12px;padding:3px 9px;border-radius:12px;display:inline-block;white-space:nowrap;}

.hide{display:none !important;}
</style>
</head>
<body>

<div class="hdr">
  <div class="hdr-top">
    <div class="hdr-l">
      <div class="hdr-logo">ES</div>
      <div>
        <div class="hdr-title">PMS 메뉴구조도 및 기능명세</div>

    </div>
  </div>
</div>

<div class="statbar" id="statBar"></div>

<div class="wrap">

  </div>
</div>

"d3": null, "d4": null, "leaf": 2, "integ": null, "comp": "- 권한그룹 생성 : 메뉴별 접근 권한 그룹을 생성\n- 권한그룹 검색/조회\n- 권한그룹에 관리자(직원) 매핑 : 다수개의 권한 그룹에 매핑 가능\n- 권한그룹 삭제 : 삭제 유의사항 제공(컨펌 박스)", "pstart": null, "pend": null, "status": "대기", "reqno": "SFR-002", "reqdetail": "■ 시스템 사용자 정보 및 권한 변경이 가능한 사용자관리 기능 개발\n- 사용자별 권한 관리(사용자/관리자), 신규사용자 생성 및 삭제 등의 기능을 제공하여야 함\n- 그룹웨어 조직정보와 연동하여 조직정보 변동시 자동으로 반영되어야 함"}, {"no": 38, "id": "PMS_SM_04", "url": "미정", "d1": "PMS 관리", "d2": "시스템 권한 관리", "d3": null, "d4": null, "leaf": 2, "integ": null, "comp": "- 메뉴별 권한 그룹으로 해결되지 않는 업무\n예) PMS의 경우 변경요청 처리/관리 업무 \n예) SRM의 경우 예정가격 입력/관리 업무", "pstart": null, "pend": null, "status": "대기", "reqno": "SFR-002", "reqdetail": "■ 프로젝트 정보 수정·삭제가 가능한 프로젝트 정보관리 기능 개발\n- 사업비, 투자비 등 사업관리 정보 변경이 가능하며, 중복프로젝트 삭제 및 프로젝트 담당자 변경(담당자 퇴사 시 이관기능)이 가능하여야 함\n- 프로젝트 정보변경 이력관리(로그관리)가 가능하여야 함"}, {"no": 39, "id": "PMS_SM_05", "url": "미정", "d1": "PMS 관리", "d2": "접속 아이피(IP) 관리", "d3": null, "d4": null, "leaf": 2, "integ": null, "comp": "- 본 시스템에 접근할 수 있는 IP(외부IP) 관리\n- 계정정보(아이디/비밀번호)가 일치하더라도 허용된 IP가 아니면 로그인 불가", "pstart": null, "pend": null, "status": "대기", "reqno": null, "reqdetail": null}, {"no": 40, "id": "PMS_SM_06", "url": "미정", "d1": "PMS 관리", "d2": "코드관리", "d3": null, "d4": null, "leaf": 2, "integ": null, "comp": "- 시스템 내에서 활용(입력 서식, 처리상태 등)하는 선택정보를 코드로 관리하여 시스템의 확장성 제공\n- 기본 3단계(Depth)의 코드관리 체계 구축(개발 시 필요하다면 4단계로 확장할 수 있음)", "pstart": null, "pend": null, "status": "대기", "reqno": null, "reqdetail": null}, {"no": 41, "id": "PMS_SM_07", "url": "미정", "d1": "PMS 관리", "d2": "로그인 현황", "d3": null, "d4": null, "leaf": 2, "integ": null, "comp": "- 본 시스템에 로그인 한 횟수를 기반으로 일/월/연도 기반으로 추이(그래프)와 로우 데이터 제공", "pstart": null, "pend": null, "status": "대기", "reqno": null, "reqdetail": null}, {"no": 42, "id": "PMS_SM_08", "url": "미정", "d1": "PMS 관리", "d2": "메뉴별 접속현황", "d3": null, "d4": null, "leaf": 2, "integ": null, "comp": "- 본 시스템의 메뉴별 접속 횟수(페이지 뷰)를 기반으로 일/월/연도 기반으로 추이(그래프)와 로우 데이터 제공", "pstart": null, "pend": null, "status": "대기", "reqno": null, "reqdetail": null}, {"no": 43, "id": "PMS_SM_09", "url": "미정", "d1": "PMS 관리", "d2": "거래처 관리", "d3": null, "d4": null, "leaf": 2, "integ": null, "comp": "- ERP에 등록된 거래처 정보를 연동하여 목록/상세정보 제공\n- PMS에서 사용되는 추가정보 관리 : 신용등급, 부채비율, 기업매출, 시공경험, 근로자 수 등\n- ERP의 거래처 고유정보와 연동하여 일원화 하여 향후 지급/상환 등의 상황에서 연동 관리할 수 있는 기반 마련", "pstart": null, "pend": null, "status": "대기", "reqno": "SFR-002", "reqdetail": "■ 협력업체 정보등록 및 수정이 가능한 협력업체관리 기능 개발\n- 협력업체 전체 리스트가 출력되어야 하며, 클릭 시 해당 협력업체의 정보(3개년 기업매출, 부채비율 등) 조회, 등록 및 수정이 가능하여야 함"}, {"no": 44, "id": "PMS_SM_10", "url": "미정", "d1": "PMS 관리", "d2": "공지사항 관리", "d3": null, "d4": null, "leaf": 2, "integ": null, "comp": "- 시스템을 이용하는 사람을 대상으로 한 공지사항\n- SRM의 경우 협력업체 공지사항도 포함해서 제공할 수 있도록 함", "pstart": null, "pend": null, "status": "대기", "reqno": null, "reqdetail": null}, {"no": 45, "id": "PMS_SM_11", "url": "미정", "d1": "PMS 관리", "d2": "양식 등 자료실 관리", "d3": null, "d4": null, "leaf": 2, "integ": null, "comp": "- 시스템을 이용하는 사람을 대상으로 한 자료실\n- SRM의 경우 협력업체 자료실도 포함해서 제공할 수 있도록 함", "pstart": null, "pend": null, "status": "대기", "reqno": null, "reqdetail": null}];

function groupColor(name){ return (META[name] && META[name].color) || 'blue'; }
function groupIcon(name){ return (META[name] && META[name].icon) || '📁'; }
function escapeHtml(s){ return String(s==null?'':s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

function countLeaves(node){
  let c = (node.leaves||[]).length;
  (node.children||[]).forEach(ch=> c += countLeaves(ch));
  return c;
}

let currentGroup = '전체';

function buildStats(){
  const total = RECORDS.length;
  const sysCount = RECORDS.filter(r=>r.integ).length;
  const reqCount = RECORDS.filter(r=>r.reqdetail).length;
  let extra = '';
  if(KIND==='PMS'){
    const doneCount = RECORDS.filter(r=>r.status).length;
    extra = `<div class="stat"><span class="v">${doneCount}</span><span class="l">진행상태 기록 항목</span></div>`;
  } else {
    extra = `<div class="stat"><span class="v">${GROUP_ORDER.length}</span><span class="l">역할(구분)</span></div>`;
  }
  document.getElementById('statBar').innerHTML = `
    <div class="stat"><span class="v">${total}</span><span class="l">총 메뉴/화면 항목</span></div>
    ${extra}
    <div class="stat"><span class="v">${sysCount}</span><span class="l">시스템 연동 항목</span></div>
    <div class="stat"><span class="v">${reqCount}</span><span class="l">요구사항 연계 항목</span></div>
  `;
}

function buildTabs(){
  let html = `<div class="tab on" style="--tc:var(--navy-dk);--tc-md:var(--navy-md);" data-g="전체" onclick="selectGroup('전체')">전체 <span class="cnt">${RECORDS.length}</span></div>`;
  TREE.forEach(node=>{
    const col = groupColor(node.name);
    const cnt = countLeaves(node);
    html += `<div class="tab" style="--tc:var(--${col});--tc-md:var(--${col}-md);" data-g="${escapeHtml(node.name)}" onclick="selectGroup('${node.name.replace(/'/g,"\\'")}')">
      ${groupIcon(node.name)} ${escapeHtml(node.name)} <span class="cnt">${cnt}</span></div>`;
  });
  document.getElementById('tabBar').innerHTML = html;
}

function selectGroup(name){
  currentGroup = name;
  document.querySelectorAll('.tab').forEach(t=> t.classList.toggle('on', t.dataset.g===name));
  renderOutline();
  switchView('outline');
}

function richTextHTML(text){
  if(!text) return '<div style="color:var(--text2);font-size:13.5px;">등록된 내용이 없습니다.</div>';
  const lines = text.split('\n');
  let html = '<ul class="func-list">';
  lines.forEach(raw=>{
    const t = raw.trim();
    if(t===''){ html += '<li class="blank"></li>'; return; }
    if(t.startsWith('■')){
      html += `<li class="hd">${escapeHtml(t.replace(/^■\s*/,''))}</li>`;
    } else if(/^\s*-/.test(raw) && raw !== raw.trimStart()){
      html += `<li class="sub">${escapeHtml(t.replace(/^-\s*/,''))}</li>`;
    } else if(t.startsWith('·')){
      html += `<li class="top">${escapeHtml(t.replace(/^·\s*/,''))}</li>`;
    } else if(t.startsWith('-')){
      html += `<li class="top">${escapeHtml(t.replace(/^-\s*/,''))}</li>`;
    } else {
      html += `<li class="top">${escapeHtml(t)}</li>`;
    }
  });
  html += '</ul>';
  return html;
}

function statusColor(status){
  if(!status) return null;
  if(status.includes('완료')) return 'blue';
  if(status.includes('진행')) return 'amber';
  if(status.includes('신규')) return 'green';
  return 'navy';
}

function leafCardHTML(rec, depthLabel){
  let badges = `<span class="bdg b-depth">${depthLabel}</span>`;
  if(rec.id) badges += `<span class="bdg b-id">${escapeHtml(rec.id)}</span>`;
  if(rec.url) badges += `<span class="bdg b-url">${escapeHtml(rec.url)}</span>`;
  if(rec.integ) badges += `<span class="bdg b-sys">🔗 연동: ${escapeHtml(rec.integ)}</span>`;
  if(KIND==='PMS'){
    if(rec.status){
      const c = statusColor(rec.status);
      badges += `<span class="bdg b-status" style="background:var(--${c});">${escapeHtml(rec.status)}</span>`;
    }
    if(rec.pstart || rec.pend){
      badges += `<span class="bdg b-date">📅 ${escapeHtml(rec.pstart||'-')} ~ ${escapeHtml(rec.pend||'-')}</span>`;
    }
  }
  if(rec.reqno) badges += `<span class="bdg b-req">${escapeHtml(rec.reqno)}</span>`;

  let reqHtml = '';
  if(rec.reqdetail){
    reqHtml = `<div class="req-panel"><div class="panel-t"><span class="dot"></span>요구사항 세부내용</div>
      ${richTextHTML(rec.reqdetail)}</div>`;
  }

  return `<div class="leaf-card">
    <div class="leaf-badges">${badges}</div>
    <div class="panel-t"><span class="dot"></span>구성 요소</div>
    ${richTextHTML(rec.comp)}
    ${reqHtml}
  </div>`;
}

function nodeHTML(node, level){
  const hasChildren = node.children && node.children.length>0;
  const leaves = node.leaves || [];
  const depthLabel = ['','Depth1','Depth2','Depth3','Depth4'][level];
  const dupTag = leaves.length>1 ? `<span class="dup-tag">원본 ${leaves.length}건 중복</span>` : '';

  if(!hasChildren){
    const openAttr = level===1 ? 'open' : '';
    const body = leaves.map(rec=> leafCardHTML(rec, depthLabel)).join('');
    return `<details class="acc lvl${level}" ${openAttr}>
      <summary>${escapeHtml(node.name)}${dupTag}<span class="lvl-tag">${depthLabel}</span></summary>
      <div class="acc-body">${body}</div>
    </details>`;
  }
  let childrenHtml = '';
  leaves.forEach(rec=> childrenHtml += leafCardHTML(rec, depthLabel));
  node.children.forEach(ch=> childrenHtml += nodeHTML(ch, level+1));
  return `<details class="acc lvl${level}">
    <summary>${escapeHtml(node.name)}${dupTag}<span class="lvl-tag">${depthLabel} 그룹</span></summary>
    <div class="acc-body">${childrenHtml}</div>
  </details>`;
}

function renderOutline(){
  const target = document.getElementById('viewOutline');
  let html = '';
  const groups = currentGroup==='전체' ? TREE : TREE.filter(g=>g.name===currentGroup);
  groups.forEach(node=>{
    const col = groupColor(node.name);
    const cnt = countLeaves(node);
    html += `<div class="role-sec" style="--rc:var(--${col});--rc-lt:var(--${col}-lt);--rc-dk:var(--${col}-dk);--ac:var(--${col});--ac-md:var(--${col}-md);">
      <div class="role-sec-hdr">
        <div class="role-sec-ic">${groupIcon(node.name)}</div>
        <div class="role-sec-t">${escapeHtml(node.name)}</div>
        <div class="role-sec-cnt">${cnt}개 항목</div>
      </div>`;
    (node.leaves||[]).forEach(rec=> html += leafCardHTML(rec, ['','Depth1'][1]));
    (node.children||[]).forEach(d2=> html += nodeHTML(d2, 2));
    html += `</div>`;
  });
  target.innerHTML = html;
}

function switchView(name){
  document.querySelectorAll('.view').forEach(v=>v.classList.remove('on'));
  document.getElementById('btnTree').classList.remove('on');
  document.getElementById('btnTable').classList.remove('on');
  document.getElementById('tabBar').style.display = (name==='outline') ? 'flex' : 'none';
  if(name==='outline'){
    document.getElementById('viewOutline').classList.add('on');
    document.getElementById('btnTree').classList.add('on');
  } else {
    document.getElementById('viewTable').classList.add('on');
    document.getElementById('btnTable').classList.add('on');
  }
  window.scrollTo({top:0});
}

function tableHead(){
  if(KIND==='PMS'){
    return ['No','ID','1Depth','2Depth','3Depth','4Depth','연동 Point','구성 요소','기획일정','진행상태','요구사항 번호','요구사항 세부내용'];
  }
  return ['No','ID','역할(구분)','1Depth','2Depth','3Depth','4Depth','연동 Point','구성 요소','요구사항 번호','요구사항 세부내용'];
}

function rowHTML(r){
  const col = KIND==='PMS' ? groupColor(r.d1) : groupColor(r.role);
  let cells = '';
  cells += `<td>${r.no??''}</td>`;
  cells += `<td class="mono">${escapeHtml(r.id||'')}</td>`;
  if(KIND==='SRM'){
    cells += `<td><span class="tr-tag" style="background:var(--${col}-lt);color:var(--${col}-dk);">${escapeHtml(r.role||'')}</span></td>`;
  }
  cells += `<td>${escapeHtml(r.d1||'')}</td><td>${escapeHtml(r.d2||'')}</td><td>${escapeHtml(r.d3||'')}</td><td>${escapeHtml(r.d4||'')}</td>`;
  cells += `<td>${escapeHtml(r.integ||'')}</td>`;
  cells += `<td class="wrap" style="min-width:280px;">${escapeHtml(r.comp||'')}</td>`;
  if(KIND==='PMS'){
    const plan = (r.pstart||r.pend) ? `${r.pstart||'-'} ~ ${r.pend||'-'}` : '';
    cells += `<td>${escapeHtml(plan)}</td><td>${escapeHtml(r.status||'')}</td>`;
  }
  cells += `<td>${escapeHtml(r.reqno||'')}</td>`;
  cells += `<td class="wrap" style="min-width:320px;">${escapeHtml(r.reqdetail||'')}</td>`;
  return `<tr>${cells}</tr>`;
}

function buildTable(list){
  document.getElementById('tblHead').innerHTML = tableHead().map(h=>`<th>${h}</th>`).join('');
  document.getElementById('tblBody').innerHTML = list.map(rowHTML).join('');
  document.getElementById('tblCnt').textContent = `총 ${list.length}건`;
}

function onSearch(kw){
  kw = kw.trim().toLowerCase();
  renderOutline();
  if(kw===''){
    buildTable(RECORDS);
    document.querySelectorAll('#viewOutline details.acc, #viewOutline .role-sec').forEach(el=> el.classList.remove('hide'));
    return;
  }
  document.querySelectorAll('#viewOutline details.acc').forEach(det=>{
    const text = det.textContent.toLowerCase();
    const match = text.includes(kw);
    det.classList.toggle('hide', !match);
    if(match) det.open = true;
  });
  document.querySelectorAll('#viewOutline .role-sec').forEach(sec=>{
    const anyVisible = Array.from(sec.querySelectorAll('details.acc.lvl1')).some(d=>!d.classList.contains('hide')) ||
                        sec.textContent.toLowerCase().includes(kw);
    sec.classList.toggle('hide', !anyVisible);
  });
  const filtered = RECORDS.filter(r=> JSON.stringify(r).toLowerCase().includes(kw));
  buildTable(filtered);
}

buildStats();
buildTabs();
renderOutline();
buildTable(RECORDS);
</script>
</body>
</html>
